
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advantech CP Marketing Toolkit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #F8FAFC;
      font-size: 14px;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    
    /* Optimized Markdown Styles - 14px Arial Primary */
    .prose { font-size: 14px !important; font-family: 'Arial', sans-serif !important; }
    .prose h1 { font-size: 1.6rem; font-weight: 900; color: #004E9A; margin-bottom: 0.8rem; text-transform: uppercase; letter-spacing: -0.01em; }
    .prose h2 { font-size: 1.4rem; font-weight: 800; color: #004E9A; margin: 1.4rem 0 0.5rem; border-bottom: 2px solid #F1F5F9; padding-bottom: 0.4rem; }
    .prose h3 { font-size: 1.15rem; font-weight: 700; color: #334155; margin: 1rem 0 0.4rem; }
    .prose p, .prose li { margin-bottom: 0.8rem; line-height: 1.6; color: #475569; font-size: 14px !important; }
    .prose table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 1.2rem 0; font-size: 13px; border: 1px solid #E2E8F0; border-radius: 8px; overflow: hidden; }
    .prose th { background: #F1F5F9; text-align: left; padding: 10px 14px; font-weight: 800; color: #004E9A; border-bottom: 1px solid #E2E8F0; }
    .prose td { padding: 10px 14px; border-bottom: 1px solid #F1F5F9; color: #64748B; background: white; font-size: 13px; }
    .prose tr:last-child td { border-bottom: none; }
    .prose blockquote { border-left: 4px solid #F59E0B; background: #FFFBEB; padding: 0.8rem 1.2rem; margin: 1rem 0; border-radius: 0 8px 8px 0; font-style: italic; color: #92400E; font-size: 14px; }
    
    /* Prose Invert */
    .prose-invert h1, .prose-invert h2 { color: #FFFFFF; border-bottom-color: rgba(255,255,255,0.1); }
    .prose-invert h3, .prose-invert p, .prose-invert li { color: #E2E8F0; font-size: 14px !important; }
    .prose-invert table { border-color: rgba(255,255,255,0.2); }
    .prose-invert th { background: rgba(255,255,255,0.1); color: #FFFFFF; border-bottom-color: rgba(255,255,255,0.2); }
    .prose-invert td { background: rgba(0,0,0,0.1); color: #CBD5E1; border-bottom-color: rgba(255,255,255,0.05); }
    
    .fact-check-card { background: #FFFFFF; border: 1px solid #E2E8F0; border-left: 4px solid #10B981; border-radius: 12px; transition: all 0.2s; font-size: 14px; }
  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "react-markdown": "https://esm.sh/react-markdown@9.0.1",
    "remark-gfm": "https://esm.sh/remark-gfm@4.0.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
